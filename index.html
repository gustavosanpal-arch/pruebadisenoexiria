document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Syne';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"9421a1b6-d25c-4be3-a590-3b5a3b37a798\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n/* ─── TOKENS ───────────────────────────────────────── */\n:root{\n  --teal:#0B7A75;\n  --teal-d:#085954;\n  --teal-l:#e6f4f3;\n  --teal-m:#d0ecea;\n  --orange:#E8832A;\n  --yellow:#F2B705;\n  --bg:#ffffff;\n  --bg-50:#F7FAFA;\n  --bg-100:#EEF4F3;\n  --line:#D4E4E2;\n  --gray-300:#A8BFBD;\n  --gray-500:#5B7B79;\n  --gray-700:#2E4948;\n  --gray-900:#0A1E1E;\n  --fh:'Syne',sans-serif;\n  --fb:'DM Sans',sans-serif;\n  --R:14px;\n  --nav-h:72px;\n  --s1:0 2px 10px rgba(11,122,117,.07);\n  --s2:0 8px 30px rgba(11,122,117,.14);\n  --s3:0 22px 60px rgba(11,122,117,.22);\n}\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\nhtml{scroll-behavior:smooth}\nbody{\n  font-family:var(--fb);\n  background:var(--bg);\n  color:var(--gray-900);\n  overflow-x:hidden;\n  -webkit-font-smoothing:antialiased;\n}\na{color:inherit;text-decoration:none}\nbutton{font-family:inherit}\n\n/* ─── CURSOR / INTERACTION POLISH ─────────────────── */\n/* Hand cursor on everything interactive */\na, button, [onclick], [role=\"button\"],\n.nl, .nav-logo, .ut, .cat-toggle, .cat-item, .pitem,\n.mega-item, .btn-pri, .btn-sec, .btn-ghost, .btn-quote,\n.btn-submit, .vcard, .stat, .use-chip { cursor:pointer }\n\n/* Inputs get text caret */\ninput[type=\"text\"], input[type=\"email\"], input[type=\"password\"],\ninput[type=\"number\"], input[type=\"tel\"], textarea { cursor:text }\n\n/* Disabled / non-interactive items */\nbutton:disabled { cursor:not-allowed }\n\n/* Tactile feedback on click */\nbutton:active:not(:disabled),\n.cat-item:active, .pitem:active, .ut:active,\n.btn-pri:active, .btn-sec:active, .btn-ghost:active,\n.btn-quote:active, .btn-submit:active, .mega-item:active {\n  transform:translateY(1px);\n}\n\n/* Visible focus ring for keyboard users */\n*:focus-visible {\n  outline:2px solid var(--yellow);\n  outline-offset:2px;\n  border-radius:4px;\n}\ninput:focus-visible, textarea:focus-visible, select:focus-visible {\n  outline:none;\n}\n\n/* Smooth selection color */\n::selection { background:var(--teal-l); color:var(--teal-d) }\n\n/* ─── NAV ───────────────────────────────────────────── */\n#nav{\n  position:fixed;top:0;inset-inline:0;z-index:900;\n  height:var(--nav-h);\n  background:rgba(255,255,255,.97);\n  backdrop-filter:blur(16px);\n  border-bottom:1px solid var(--line);\n  display:flex;align-items:center;justify-content:space-between;\n  padding:0 44px;\n  transition:box-shadow .3s;\n}\n#nav.scrolled{box-shadow:var(--s1)}\n.nav-logo{cursor:pointer;line-height:0;display:flex;align-items:center;gap:10px}\n.nav-logo img{height:42px}\n.nav-links{display:flex;align-items:center;gap:4px;list-style:none}\n.nl{\n  font-family:var(--fh);font-weight:600;font-size:.84rem;\n  color:var(--gray-700);letter-spacing:.05em;\n  padding:9px 14px;border-radius:9px;\n  cursor:pointer;background:none;border:none;\n  display:flex;align-items:center;gap:5px;\n  transition:color .2s,background .2s;white-space:nowrap;\n  text-transform:uppercase;\n}\n.nl:hover,.nl.open{color:var(--teal);background:var(--teal-l)}\n.arr{font-size:.55rem;transition:transform .2s}\n.nl.open .arr{transform:rotate(180deg)}\n.nav-item{position:relative}\n\n.mega{\n  display:none;\n  position:absolute;top:calc(100% + 8px);right:0;\n  background:white;border:1px solid var(--line);\n  border-radius:var(--R);box-shadow:var(--s2);\n  padding:14px;min-width:640px;z-index:999;\n}\n.mega.open{display:grid}\n.mega{grid-template-columns:1fr 1fr;gap:8px}\n.mega-col-title{\n  grid-column:1/-1;\n  font-family:var(--fh);font-size:.7rem;font-weight:700;\n  letter-spacing:.12em;text-transform:uppercase;\n  color:var(--gray-300);padding:4px 10px 8px;\n}\n.mega-item{\n  display:flex;flex-direction:column;gap:2px;\n  padding:11px 14px;border-radius:10px;cursor:pointer;\n  transition:background .15s;border:none;background:none;text-align:left;\n}\n.mega-item:hover{background:var(--teal-l)}\n.mi-cat{\n  font-family:var(--fh);font-weight:700;font-size:.78rem;\n  letter-spacing:.06em;text-transform:uppercase;color:var(--teal-d);\n}\n.mi-desc{font-size:.78rem;color:var(--gray-500);line-height:1.4}\n\n/* ─── HERO ─────────────────────────────────────────── */\n#hero{\n  min-height:100vh;\n  padding:calc(var(--nav-h) + 60px) 44px 80px;\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  text-align:center;\n  position:relative;overflow:hidden;\n  background:var(--teal-d);\n}\n.hero-bg{\n  position:absolute;inset:0;z-index:0;\n  background-image:url(\"b5792a05-d2fe-4af0-afba-bf2ce35748f0\");\n  background-size:cover;background-position:center;background-repeat:no-repeat;\n  filter:saturate(.85) contrast(1.05);\n}\n.hero-bg::after{\n  content:'';position:absolute;inset:0;\n  background:linear-gradient(160deg,rgba(8,89,84,.92) 0%,rgba(11,122,117,.86) 55%,rgba(16,168,159,.82) 100%);\n}\n.hero-grid{\n  position:absolute;inset:0;z-index:1;\n  background-image:\n    linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);\n  background-size:64px 64px;\n  mask-image:radial-gradient(circle at 50% 50%, black 30%, transparent 80%);\n}\n.hero-shade{\n  position:absolute;inset:0;z-index:1;\n  background:radial-gradient(60% 80% at 80% 10%, rgba(232,131,42,.22), transparent 55%),\n             radial-gradient(50% 70% at 10% 90%, rgba(242,183,5,.18), transparent 55%);\n  pointer-events:none;\n}\n.hero-z{position:relative;z-index:2;max-width:880px;display:flex;flex-direction:column;align-items:center}\n.hero-logo{\n  height:140px;margin-bottom:36px;\n  filter:drop-shadow(0 8px 30px rgba(0,0,0,.28));\n  background:white;border-radius:24px;padding:16px 24px;\n  animation:logoIn .85s cubic-bezier(.22,1,.36,1) both;\n}\n@keyframes logoIn{from{opacity:0;transform:translateY(-20px) scale(.92)}to{opacity:1;transform:none}}\n.hero-tag{\n  display:inline-flex;align-items:center;gap:8px;\n  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);\n  color:rgba(255,255,255,.92);font-size:.74rem;font-weight:600;\n  padding:6px 16px;border-radius:50px;margin-bottom:24px;\n  letter-spacing:.09em;text-transform:uppercase;\n  animation:fadeUp .85s .1s cubic-bezier(.22,1,.36,1) both;\n}\n.hero-tag span{width:7px;height:7px;border-radius:50%;background:var(--yellow);display:inline-block}\n.hero-h1{\n  font-family:var(--fh);font-weight:800;\n  font-size:clamp(2.1rem,5.5vw,4.2rem);\n  color:white;line-height:1.05;margin-bottom:20px;letter-spacing:-.01em;\n  animation:fadeUp .85s .18s cubic-bezier(.22,1,.36,1) both;\n}\n.hero-h1 em{font-style:normal;color:var(--yellow)}\n.hero-p{\n  color:rgba(255,255,255,.78);\n  font-size:clamp(1rem,1.7vw,1.15rem);\n  max-width:560px;line-height:1.7;margin-bottom:50px;\n  animation:fadeUp .85s .26s cubic-bezier(.22,1,.36,1) both;\n}\n@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}\n.hero-cta{\n  display:flex;gap:14px;flex-wrap:wrap;justify-content:center;\n  animation:fadeUp .85s .34s cubic-bezier(.22,1,.36,1) both;\n}\n.btn-pri,.btn-sec{\n  display:inline-flex;align-items:center;gap:10px;\n  font-family:var(--fh);font-weight:700;font-size:.92rem;\n  padding:14px 26px;border-radius:50px;border:none;cursor:pointer;\n  letter-spacing:.02em;transition:transform .18s,box-shadow .2s,background .2s;\n}\n.btn-pri{background:var(--yellow);color:var(--gray-900)}\n.btn-pri:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(242,183,5,.4)} ixed;bottom:28px;right:28px;z-index:9999;\n  background:var(--teal-d);color:white;\n  padding:13px 22px;border-radius:50px;\n  font-family:var(--fh);font-weight:600;font-size:.84rem;\n  box-shadow:var(--s3);\n  transform:translateY(80px);opacity:0;pointer-events:none;\n  transition:all .35s cubic-bezier(.22,1,.36,1);\n  display:flex;align-items:center;gap:8px;\n}\n#toast.on{transform:none;opacity:1}\n\n/* ─── RESPONSIVE ──────────────────────────────────── */\n@media(max-width:920px){\n  #nav{padding:0 20px}\n  .nav-links{gap:0}\n  .nav-links li:not(:last-child):not(.nav-item){display:none}\n  .mega{min-width:300px;right:-100px}\n  .section{padding:64px 22px}\n  #hero{padding:calc(var(--nav-h) + 40px) 22px 60px}\n  .hero-logo{height:100px}\n  .nos-wrap{grid-template-columns:1fr;gap:48px}\n  .ct-wrap{grid-template-columns:1fr;gap:36px}\n  .detail-body{grid-template-columns:1fr}\n  .plist{max-height:280px;border-right:none;border-bottom:1px solid var(--line)}\n  .ct-form .row{grid-template-columns:1fr}\n  .sec-head{flex-direction:column;align-items:flex-start}\n  footer{flex-direction:column;text-align:center}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- NAV -->\n<nav id=\"nav\">\n  <a class=\"nav-logo\" href=\"#hero\">\n    <img src=\"5de47c53-a0c3-4bc4-82fb-66d765fd017f\" alt=\"Exiria\">\n  <\u002Fa>\n  <ul class=\"nav-links\">\n    <li><a class=\"nl\" href=\"#nosotros\">Quiénes somos<\u002Fa><\u002Fli>\n    <li class=\"nav-item\">\n      <button class=\"nl\" id=\"prod-btn\" onclick=\"toggleMega(event)\">Productos e Industrias <span class=\"arr\">▾<\u002Fspan><\u002Fbutton>\n      <div class=\"mega\" id=\"mega\">\n        <div class=\"mega-col-title\">Industria<\u002Fdiv>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('transformer')\">\n          <span class=\"mi-cat\">Transformer Oils<\u002Fspan>\n          <span class=\"mi-desc\">Mineral inhibido y éster natural<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('wmo')\">\n          <span class=\"mi-cat\">Aceite Mineral Blanco (WMO)<\u002Fspan>\n          <span class=\"mi-desc\">USP / FDA · WMO 60 a 500<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('proceso')\">\n          <span class=\"mi-cat\">Aceites de Proceso<\u002Fspan>\n          <span class=\"mi-desc\">Nafténico · Parafínico · Aromático<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('bases')\">\n          <span class=\"mi-cat\">Aceites Base<\u002Fspan>\n          <span class=\"mi-desc\">Grupo I y II<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('aditivos')\">\n          <span class=\"mi-cat\">Aditivos<\u002Fspan>\n          <span class=\"mi-desc\">Paquetes y aditivos individuales<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('lubricantes')\">\n          <span class=\"mi-cat\">Lubricantes<\u002Fspan>\n          <span class=\"mi-desc\">Hidráulicos, engranajes, térmicos<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"mega-col-title\" style=\"margin-top:8px\">Agro<\u002Fdiv>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('spray')\">\n          <span class=\"mi-cat\">Spray Oils / Coadyuvantes<\u002Fspan>\n          <span class=\"mi-desc\">Aceites para pulverización<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('soja')\">\n          <span class=\"mi-cat\">Aceite Metilado de Soja<\u002Fspan>\n          <span class=\"mi-desc\">MSO 100 % y mezclas<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('bio')\">\n          <span class=\"mi-cat\">Bioestimulantes<\u002Fspan>\n          <span class=\"mi-desc\">Algas, aminoácidos, húmicos<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"mega-item\" onclick=\"openCatFromNav('nutricion')\">\n          <span class=\"mi-cat\">Nutrición Vegetal<\u002Fspan>\n          <span class=\"mi-desc\">Quelatos y foliares<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fli>\n    <li><a class=\"nl\" href=\"#contacto\">Contacto<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Fnav>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"hero-bg\"><\u002Fdiv>\n  <div class=\"hero-grid\"><\u002Fdiv>\n  <div class=\"hero-shade\"><\u002Fdiv>\n  <div class=\"hero-z\">\n    <img class=\"hero-logo\" src=\"5de47c53-a0c3-4bc4-82fb-66d765fd017f\" alt=\"Exiria\">\n    <div class=\"hero-tag\"><span><\u002Fspan> Especialidades químicas · Argentina · Chile<\u002Fdiv>\n    <h1 class=\"hero-h1\">Tecnología e innovación para la<br><em>industria y el agro<\u002Fem><\u002Fh1>\n    <p class=\"hero-p\">Aceites técnicos, lubricantes y fluidos de proceso de alto rendimiento. Calidad certificada, presencia regional.<\u002Fp>\n    <div class=\"hero-cta\">\n      <a href=\"#productos\" class=\"btn-pri\">Ver productos →<\u002Fa>\n      <a href=\"#contacto\" class=\"btn-sec\">Contactanos<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- QUIÉNES SOMOS -->\n<section id=\"nosotros\" class=\"section\">\n  <div class=\"nos-wrap\">\n    <div class=\"nos-text\">\n      <div class=\"sec-tag\">Quiénes somos<\u002Fdiv>\n      <h2 class=\"sec-h2\">Química especializada con <em>presencia regional<\u002Fem>.<\u002Fh2>\n      <p style=\"margin-top:24px\">Exiria nace como proveedor de aceite mineral grado alimenticio para la industria cosmética y el agro. Con el tiempo desarrollamos nuevas líneas con dos unidades de negocio diferenciadas: <strong>Industria<\u002Fstrong> y <strong>Agro<\u002Fstrong>.<\u002Fp>\n      <p>Operamos desde <strong>Rosario, Argentina<\u002Fstrong> y <strong>Santiago, Chile<\u002Fstrong>, abasteciendo a fabricantes, formuladores y distribuidores en toda la región con productos que cumplen normas IEC, FDA, USP, BP y ASTM.<\u002Fp>\n      <div class=\"nos-stats\">\n        <div class=\"stat\"><div class=\"stat-n\">10+<\u002Fdiv><div class=\"stat-l\">Líneas de producto<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat\"><div class=\"stat-n\">2<\u002Fdiv><div class=\"stat-l\">Países con operación directa<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat\"><div class=\"stat-n\">USP/FDA<\u002Fdiv><div class=\"stat-l\">Calidad certificada<\u002Fdiv><\u002Fdiv>\n        <div class=\"stat\"><div class=\"stat-n\">B2B<\u002Fdiv><div class=\"stat-l\">Industria y agro<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"nos-visual\">\n      <div class=\"nos-img\"><\u002Fdiv>\n      <div class=\"nos-overlay\">\n        <div class=\"vcard\">\n          <div class=\"vc-emblem\" style=\"background:var(--teal)\">I<\u002Fdiv>\n          <h4>Industria<\u002Fh4>\n          <p>Transformer oils, aceites de proceso, bases, aditivos y lubricantes.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"vcard\">\n          <div class=\"vc-emblem\" style=\"background:var(--orange)\">A<\u002Fdiv>\n          <h4>Agro<\u002Fh4>\n          <p>Spray oils, MSO, bioestimulantes y nutrición vegetal.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"vcard\">\n          <div class=\"vc-emblem\" style=\"background:var(--yellow);color:var(--gray-900)\">Q<\u002Fdiv>\n          <h4>Calidad<\u002Fh4>\n          <p>Productos certificados bajo normas internacionales.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"vcard\">\n          <div class=\"vc-emblem\" style=\"background:var(--teal-d)\">R<\u002Fdiv>\n          <h4>Regional<\u002Fh4>\n          <p>Argentina y Chile. Atención técnica local.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRODUCTOS -->\n<section id=\"productos\" class=\"section\">\n  <div class=\"sec-head\">\n    <div>\n      <div class=\"sec-tag\">Productos e industrias<\u002Fdiv>\n      <h2 class=\"sec-h2\">Catálogo técnico por <em>unidad de negocio<\u002Fem>.<\u002Fh2>\n    <\u002Fdiv>\n    <p class=\"sec-sub\">Elegí una unidad y abrí el menú de tipos de producto. Al seleccionar un producto verás su cuadro de características.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- Unidad: Industria / Agro -->\n  <div class=\"unit-tabs\">\n    <button class=\"ut active\" data-unit=\"industria\" onclick=\"setUnit('industria')\">\n      <span class=\"ut-dot\"><\u002Fspan> Industria\n    <\u002Fbutton>\n    <button class=\"ut\" data-unit=\"agro\" onclick=\"setUnit('agro')\">\n      <span class=\"ut-dot\"><\u002Fspan> Agro\n    <\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- Desplegable tipos de producto -->\n  <div class=\"cat-shell\" id=\"cat-shell\">\n    <button class=\"cat-toggle\" onclick=\"toggleCatShell()\">\n      <span id=\"cat-toggle-label\">Tipos de producto · Industria<\u002Fspan>\n      <span class=\"arr\">▾<\u002Fspan>\n    <\u002Fbutton>\n    <div class=\"cat-grid\" id=\"cat-grid\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Detalle: lista de productos + cuadro de características -->\n  <div class=\"detail\" id=\"detail\">\n    <div class=\"detail-head\">\n      <div class=\"detail-head-img\" id=\"d-img\"><\u002Fdiv>\n      <div class=\"detail-head-c\">\n        <div class=\"detail-bc\" id=\"d-bc\">—<\u002Fdiv>\n        <div class=\"detail-h\" id=\"d-h\">—<\u002Fdiv>\n        <p class=\"detail-blurb\" id=\"d-blurb\">—<\u002Fp>\n        <div class=\"detail-uses\" id=\"d-uses\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"detail-body\">\n      <div class=\"plist\">\n        <div class=\"plist-hdr\">Productos<\u002Fdiv>\n        <div id=\"plist-items\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pdetail\" id=\"pdetail\">\n        <div class=\"pd-empty\">\n          <div class=\"pd-empty-mark\">E<\u002Fdiv>\n          <div>Seleccioná un producto de la lista para ver sus características técnicas.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CONTACTO -->\n<section id=\"contacto\">\n  <div class=\"sec-head\">\n    <div>\n      <div class=\"sec-tag\">Contacto<\u002Fdiv>\n      <h2 class=\"sec-h2\">¿Necesitás más <em>información<\u002Fem>?<\u002Fh2>\n    <\u002Fdiv>\n    <p class=\"sec-sub\">Consultanos sobre disponibilidad, precios o requerimientos técnicos. Equipos en Argentina y Chile.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"ct-wrap\">\n    <div>\n      <div class=\"offices\">\n        <div class=\"office\">\n          <div class=\"office-flag\">🇦🇷 Argentina<\u002Fdiv>\n          <div class=\"office-name\">Exiria SAS — Rosario<\u002Fdiv>\n          <div class=\"office-addr\">Montevideo 1332, Rosario, Santa Fe, Argentina<\u002Fdiv>\n          <div class=\"office-people\">\n            <div class=\"person\">\n              <a class=\"person-mail\" href=\"mailto:sergio.f.rodriguez@exiria.tech\">sergio.f.rodriguez@exiria.tech<\u002Fa>\n              <span class=\"person-tel\">+54 9 3416 65 9375<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"person\">\n              <a class=\"person-mail\" href=\"mailto:ruben.graffigna@exiria.tech\">ruben.graffigna@exiria.tech<\u002Fa>\n              <span class=\"person-tel\">+54 9 115 407 4508<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"person\">\n              <a class=\"person-mail\" href=\"mailto:gustavo.sanchez@exiria.tech\">gustavo.sanchez@exiria.tech<\u002Fa>\n              <span class=\"person-tel\">+54 9 3416 55 4843<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"office\">\n          <div class=\"office-flag\">🇨🇱 Chile<\u002Fdiv>\n          <div class=\"office-name\">Exiria — Santiago<\u002Fdiv>\n          <div class=\"office-addr\">General del Canto 230, Of. 701, Providencia, Santiago<\u002Fdiv>\n          <div class=\"office-people\">\n            <div class=\"person\">\n              <a class=\"person-mail\" href=\"mailto:alejandro.facuse@exiria.tech\">alejandro.facuse@exiria.tech<\u002Fa>\n              <span class=\"person-tel\">+56 965093172<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <form class=\"ct-form\" onsubmit=\"submitContact(event)\">\n      <div class=\"row\">\n        <div>\n          <div class=\"fi-label\">Nombre<\u002Fdiv>\n          <input class=\"fi\" name=\"nombre\" type=\"text\" placeholder=\"Tu nombre\" required=\"\">\n        <\u002Fdiv>\n        <div>\n          <div class=\"fi-label\">Empresa<\u002Fdiv>\n          <input class=\"fi\" name=\"empresa\" type=\"text\" placeholder=\"Tu empresa\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div>\n          <div class=\"fi-label\">Email<\u002Fdiv>\n          <input class=\"fi\" name=\"email\" type=\"email\" placeholder=\"tu@empresa.com\" required=\"\">\n        <\u002Fdiv>\n        <div>\n          <div class=\"fi-label\">Teléfono<\u002Fdiv>\n          <input class=\"fi\" name=\"tel\" type=\"text\" placeholder=\"+54 9 ...\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"fi-label\">Producto / línea de interés<\u002Fdiv>\n        <input class=\"fi\" id=\"ct-prod\" name=\"producto\" type=\"text\" placeholder=\"Ej: WMO 70, TO NE, Bioestimulantes...\">\n      <\u002Fdiv>\n      <div>\n        <div class=\"fi-label\">Consulta<\u002Fdiv>\n        <textarea class=\"fi\" name=\"mensaje\" placeholder=\"Contanos qué necesitás…\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <button type=\"submit\" class=\"btn-submit\">Enviar consulta →<\u002Fbutton>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <img src=\"5de47c53-a0c3-4bc4-82fb-66d765fd017f\" alt=\"Exiria\">\n  <p>© 2025 Exiria SAS · Rosario · Santiago · <a href=\"https://www.exiria.tech\">www.exiria.tech<\u002Fa><\u002Fp>\n<\u002Ffooter>\n\n<div id=\"toast\"><span id=\"tmsg\"><\u002Fspan><\u002Fdiv>\n\n<script src=\"fb7c7b7c-6326-4b60-93f7-7cb5320b63b3\"><\u002Fscript>\n<script>\n/* ─── STATE ─────────────────────────────────── */\nlet currentUnit = 'industria';\nlet currentCat = null;\nlet currentProduct = null;\n\n/* ─── NAV / MEGA ────────────────────────────── */\nwindow.addEventListener('scroll', () => {\n  document.getElementById('nav').classList.toggle('scrolled', scrollY > 20);\n});\n\nfunction toggleMega(e) {\n  e.stopPropagation();\n  const m = document.getElementById('mega');\n  const b = document.getElementById('prod-btn');\n  const isOpen = m.classList.toggle('open');\n  b.classList.toggle('open', isOpen);\n}\ndocument.addEventListener('click', e => {\n  if (!e.target.closest('.nav-item')) {\n    document.getElementById('mega').classList.remove('open');\n    document.getElementById('prod-btn').classList.remove('open');\n  }\n});\n\nfunction openCatFromNav(cat) {\n  document.getElementById('mega').classList.remove('open');\n  document.getElementById('prod-btn').classList.remove('open');\n  const unit = CATEGORIES[cat].unit;\n  setUnit(unit, true);\n  document.getElementById('cat-shell').classList.add('open');\n  selectCategory(cat);\n  setTimeout(() => {\n    document.getElementById('productos').scrollIntoView({behavior:'smooth'});\n  }, 60);\n}\n\n/* ─── UNIT TABS ─────────────────────────────── */\nfunction setUnit(unit, skipScroll) {\n  currentUnit = unit;\n  document.querySelectorAll('.ut').forEach(b => {\n    b.classList.toggle('active', b.dataset.unit === unit);\n  });\n  document.getElementById('cat-toggle-label').textContent =\n    'Tipos de producto · ' + UNITS[unit].label;\n  renderCategories();\n  // reset detail until category chosen\n  currentCat = null;\n  currentProduct = null;\n  document.getElementById('detail').classList.remove('open');\n  document.getElementById('cat-shell').classList.add('open');\n}\n\n/* ─── CATEGORY DROPDOWN ─────────────────────── */\nfunction toggleCatShell() {\n  document.getElementById('cat-shell').classList.toggle('open');\n}\n\nfunction renderCategories() {\n  const grid = document.getElementById('cat-grid');\n  const cats = UNITS[currentUnit].categories;\n  grid.innerHTML = cats.map(key => {\n    const c = CATEGORIES[key];\n    const img = c.image || '';\n    return `\n      <button class=\"cat-item ${key===currentCat?'active':''}\" onclick=\"selectCategory('${key}')\">\n        <div class=\"cat-item-img\" style=\"background-image:url('${img}')\"><\u002Fdiv>\n        <div class=\"cat-item-body\">\n          <div class=\"ci-label\">${escapeHtml(c.label)}<\u002Fdiv>\n          <div class=\"ci-desc\">${escapeHtml(c.short)} · ${c.products.length} producto${c.products.length!==1?'s':''}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fbutton>\n    `;\n  }).join('');\n}\n\nfunction selectCategory(catKey) {\n  currentCat = catKey;\n  currentProduct = null;\n  const c = CATEGORIES[catKey];\n\n  // highlight in grid\n  document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));\n  document.querySelectorAll('.cat-item').forEach(el => {\n    const lbl = el.querySelector('.ci-label');\n    if (lbl && lbl.textContent === c.label) el.classList.add('active');\n  });\n\n  // fill detail header\n  document.getElementById('d-img').style.backgroundImage =\n    c.image ? `url('${c.image}')` : 'linear-gradient(135deg,var(--teal-d),var(--teal))';\n  document.getElementById('d-bc').textContent =\n    UNITS[c.unit].label + ' · Línea';\n  document.getElementById('d-h').textContent = c.label;\n  document.getElementById('d-blurb').textContent = c.blurb;\n  document.getElementById('d-uses').innerHTML =\n    (c.usos || []).map(u => `<span class=\"use-chip\">${escapeHtml(u)}<\u002Fspan>`).join('');\n\n  // fill product list\n  document.getElementById('plist-items').innerHTML =\n    c.products.map((p,i) => `\n      <button class=\"pitem\" onclick=\"selectProduct(${i})\">\n        <span>${escapeHtml(p.name)}<\u002Fspan>\n        <span class=\"arr\">▸<\u002Fspan>\n      <\u002Fbutton>\n    `).join('');\n\n  // reset product detail\n  document.getElementById('pdetail').innerHTML = `\n    <div class=\"pd-empty\">\n      <div class=\"pd-empty-mark\">E<\u002Fdiv>\n      <div>Seleccioná un producto de la lista para ver sus características técnicas.<\u002Fdiv>\n    <\u002Fdiv>`;\n\n  document.getElementById('detail').classList.add('open');\n\n  // auto-select first product after a beat\n  if (c.products.length) {\n    setTimeout(() => selectProduct(0), 100);\n  }\n}\n\nfunction selectProduct(i) {\n  const c = CATEGORIES[currentCat];\n  const p = c.products[i];\n  currentProduct = i;\n\n  document.querySelectorAll('.pitem').forEach((el, idx) => {\n    el.classList.toggle('active', idx === i);\n  });\n\n  document.getElementById('pdetail').innerHTML = `\n    <div class=\"pd-name\">${escapeHtml(p.name)}<\u002Fdiv>\n    <div class=\"pd-desc\">${escapeHtml(p.desc)}<\u002Fdiv>\n    <div class=\"pd-section-title\">Características técnicas<\u002Fdiv>\n    <table class=\"spec-table\">\n      <tbody>\n        ${p.specs.map(([k,v]) => `\n          <tr>\n            <th>${escapeHtml(k)}<\u002Fth>\n            <td>${escapeHtml(v)}<\u002Ftd>\n          <\u002Ftr>\n        `).join('')}\n      <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"spec-foot\">\n      <button class=\"btn-quote\" onclick=\"quoteProduct('${escapeAttr(p.name)}')\">\n        Solicitar cotización\n      <\u002Fbutton>\n      <button class=\"btn-ghost\" onclick=\"copySpecs(${i})\">\n        Copiar especificaciones\n      <\u002Fbutton>\n    <\u002Fdiv>\n  `;\n}\n\n/* ─── ACTIONS ───────────────────────────────── */\nfunction quoteProduct(name) {\n  document.getElementById('ct-prod').value = name;\n  document.getElementById('contacto').scrollIntoView({behavior:'smooth'});\n  setTimeout(() => {\n    document.getElementById('ct-prod').focus();\n    toast('Producto cargado: ' + name);\n  }, 700);\n}\n\nfunction copySpecs(i) {\n  const c = CATEGORIES[currentCat];\n  const p = c.products[i];\n  const txt = p.name + '\\n' + '—'.repeat(p.name.length) + '\\n' +\n    p.specs.map(([k,v]) => k + ': ' + v).join('\\n');\n  navigator.clipboard.writeText(txt).then(() => {\n    toast('Especificaciones copiadas');\n  });\n}\n\nfunction submitContact(e) {\n  e.preventDefault();\n  toast('Consulta enviada. Te contactamos pronto.');\n  e.target.reset();\n}\n\n/* ─── UTILS ─────────────────────────────────── */\nfunction escapeHtml(s) {\n  return String(s == null ? '' : s)\n    .replace(/&/g,'&amp;')\n    .replace(/<\u002Fg,'&lt;')\n    .replace(/>/g,'&gt;')\n    .replace(/\"/g,'&quot;');\n}\nfunction escapeAttr(s) {\n  return escapeHtml(s).replace(/'/g, \"\\\\'\");\n}\n\nlet toastT;\nfunction toast(msg) {\n  const t = document.getElementById('toast');\n  document.getElementById('tmsg').textContent = msg;\n  t.classList.add('on');\n  clearTimeout(toastT);\n  toastT = setTimeout(() => t.classList.remove('on'), 3200);\n}\n\n/* ─── INIT ──────────────────────────────────── */\nrenderCategories();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
